name: Deploy to Server

on:
  push:
    branches: [main] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build the project
        run: npm run build
        env:
          CI: false 
        # GitHub Actions 的 runner 内存充足，不会 OOM ✅

      - name: Deploy to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 8.159.153.140
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "build/*"
          target: "/var/www/boyuan-web-frontend/"
          strip_components: 1
          rm: true
