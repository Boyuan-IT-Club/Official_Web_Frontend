name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        env:
          CI: false
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          rsync -avz --delete \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/boyuan-web-frontend/dist/

      - name: Verify
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "ls -la /var/www/boyuan-web-frontend/dist/ && echo 'Deploy OK'"

      - name: Debug SSH
        run: |
          echo "=== Keys in agent ==="
          ssh-add -l || echo "No keys loaded"
          echo "=== Key fingerprint ==="
          ssh-add -L 2>/dev/null | head -1 || echo "Cannot list key"
          echo "=== Server host ==="
          echo "${{ secrets.SERVER_HOST }}"
          echo "=== Server user ==="
          echo "${{ secrets.SERVER_USER }}"